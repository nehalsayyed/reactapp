
buildscript {
    repositories {
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:0.14+'
    }
}

apply plugin: 'com.android.application'

android {
    compileSdkVersion 36
    buildToolsVersion 36

    defaultConfig {
        ndk {
            moduleName "nativeegl"
            ldLibs "log", "android", "EGL", "GLESv1_CM"
        }
    }
}

task wrapper(type: Wrapper) {
    gradleVersion = '8.13'
}

